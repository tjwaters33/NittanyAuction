{% extends "page.html" %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='homeStyles.css') }}"></link>
<div class="container mt-4">
  <h2 class="mb-3">You have {{ requests | length }} open request(s)</h2>
 
  <div style="display: grid; grid-template-columns: auto 1fr auto auto; gap: 0.75rem 1.5rem; align-items: center;">
    {% for request in requests %}
        <hr style="grid-column: 1 / -1; margin: 0; border-top: 1px solid #ced4da">
      <strong class="text-nowrap">{{ request[3] }}</strong>
      <p class="mb-0">{{ request[4] }}</p>
      <p class="mb-0">{{ request[1] }}</p>
      <button class="btn btn-danger">Close</button>
    {% endfor %}
  </div>
</div>
 
{% endblock %}
