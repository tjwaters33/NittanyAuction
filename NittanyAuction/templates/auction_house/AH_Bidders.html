
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<title>NittanyAuction</title>
	<style>
		body { margin: 0; font-family: Arial, sans-serif; }

		nav {
			display: flex;
			justify-content: space-between;
			align-items: center;
			background-color: #222;
			padding: 10px 20px;
		}

		nav h1 {
			color: white;
			margin: 0;
			font-size: 24px;
		}

		button {
			background: none;
			border: 1px solid white;
			color: white;
			font-size: 18px;
			cursor: pointer;
			padding: 5px 10px;
			border-radius: 4px;
		}

		#menu {
			display: none;
			background-color: #333;
			padding: 10px 20px;
		}

		#menu a {
			display: block;
			color: white;
			text-decoration: none;
			padding: 8px 0;
			border-bottom: 1px solid #444;
		}

		#menu a:hover { color: #f5c842; }

		#category-panel {
			padding: 20px;
			width: 20vw;
		}

		#breadcrumb {
			margin-bottom: 15px;
			font-size: 14px;
		}

		#breadcrumb span {
			cursor: pointer;
			color: #0066cc;
		}

		#cat-table {
			width: 100%;
			border-collapse: collapse;
		}

		#cat-table td {
			border: 1px solid #ddd;
			padding: 10px;
			cursor: pointer;
		}

		#cat-table tbody tr:hover {
			background-color: #f9f9f9;
		}
	</style>
</head>
<body>

	<nav>
		<h1>NittanyAuction</h1>
		<button onclick="toggleMenu()">☰</button>
	</nav>

	<div id="menu">
		<a href="#">Home</a>
		<a href="#">Browse Listings</a>
		<a href="#">My Bids</a>
		<a href="#">Sell an Item</a>
		<a href="#">Account</a>
	</div>
		<div id="category-panel">
		<div id="breadcrumb"></div>
		<table id="cat-table">
			<tbody id="cat-body"></tbody>
		</table>
	</div>

	<script>
		let path = ["Root"];

		async function getSubcategories(category) {
			const formData = new FormData();
			formData.append("super_category", category);

			const response = await fetch("{{ url_for('get_subcategories') }}", {
				method: "POST",
				body: formData
			});

			return await response.json();
		}

		function renderBreadcrumb() {
			const bc = document.getElementById("breadcrumb");
			bc.innerHTML = "";

			path.forEach(function(crumb, index) {
				const link = document.createElement("span");
				link.textContent = crumb;
				link.style.cursor = "pointer";
				link.style.color = "#0066cc";
				link.style.textDecoration = "underline";

				link.onclick = function() {
					path = path.slice(0, index + 1);
					render();
				};

				bc.appendChild(link);

				if (index < path.length - 1) {
					const separator = document.createElement("span");
					separator.textContent = " > ";
					separator.style.cursor = "default";
					separator.style.color = "black";
					separator.style.textDecoration = "none";
					bc.appendChild(separator);
				}
			});
		}

		async function render() {
			const tbody = document.getElementById("cat-body");
			tbody.innerHTML = "";

			renderBreadcrumb();

			const current = path[path.length - 1];
			const categories = await getSubcategories(current);

			categories.forEach(function(cat) {
				const row = document.createElement("tr");

				const cell = document.createElement("td");
				cell.textContent = cat;

				row.appendChild(cell);

				row.onclick = function() {
					path.push(cat);
					render();
				};

				tbody.appendChild(row);
			});
		}

		function toggleMenu() {
			const menu = document.getElementById("menu");
			menu.style.display =
				menu.style.display === "block" ? "none" : "block";
		}

		window.onload = render;

	</script>

</body>
</html>
