{% extends "base.html" %}

{% block content %}
        <form action="/register_local_vendor" method="POST">

            {% if error %}<div class="alert alert-danger mt-3">{{ error }}</div>{% endif %}
            <div class="form-group">
                <label for="email">Email</label>
                <input type="text" name="email" required class="form-control {% if error %}is-invalid{% endif %}">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" required class="form-control {% if error %}is-invalid{% endif %}" id="password" >
			</div>

            <div class="form-group">
                <label for="bank_routing_number">Bank Routing Number</label>
                <input type="text" name="bank_routing_number" required class="form-control">
            </div>

            <div class="form-group">
                <label for="bank_account_number">Bank Account Number</label>
                <input type="text" name="bank_account_number" required class="form-control">
            </div>

            <div class="form-group">
                <label for="balance">Initial Balance</label>
                <input type="number" name="balance" required class="form-control">
            </div>

            <div class="form-group">
                <label for="business_name">Business Name</label>
                <input type="text" name="business_name" required class="form-control">
            </div>

            <div class="form-group">
                <label for="zipcode">Zipcode</label>
                <input type="number" name="zipcode" required class="form-control">
            </div>

            <div class="form-group">
                <label for="city">City</label>
                <input type="text" name="city" required class="form-control">
            </div>

            <div class="form-group">
                <label for="state">State</label>
                <input type="text" name="state" required class="form-control">
            </div>

            <div class="form-group">
                <label for="street_num">Street Number</label>
                <input type="number" name="street_num" required class="form-control">
            </div>

            <div class="form-group">
                <label for="street_name">Street Name</label>
                <input type="text" name="street_name" required class="form-control">
            </div>

            <div class="form-group">
                <label for="customer_service_phone_number">Customer Service Phone Number</label>
                <input type="text" name="customer_service_phone_number" required class="form-control">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%">Register</button>
        </form>
		<!--<form action="/forget_password" method="POST">
            <a class="btn btn-success" href="/reset_password" role="button">Forgot Password?</a>
        </form>-->
{% endblock %}
