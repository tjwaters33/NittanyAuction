{% extends "page.html" %}

{% block content %}
<div class="container mt-4">
    <div class="card p-4">
        <h2 class="mb-3">Edit Listing</h2>

        {% if success %}
            <div class="alert alert-success">{{ success }}</div>
        {% endif %}

        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        {% if listing %}
        <form action="/edit_listing?token={{ token }}&listing_id={{ listing[1] }}" method="POST">
            <input type="hidden" name="seller_email" value="{{ listing[0] }}">
            <input type="hidden" name="listing_id" value="{{ listing[1] }}">

            <div class="form-group">
                <label for="seller_email_display">Seller Email</label>
                <input type="text" id="seller_email_display" class="form-control" value="{{ listing[0] }}" readonly>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <select name="category" id="category" class="form-control" required>
                    {% for category in categories %}
                        <option value="{{ category }}" {% if category == listing[2] %}selected{% endif %}>
                            {{ category }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="auction_title">Auction Title</label>
                <input type="text" name="auction_title" id="auction_title" class="form-control" value="{{ listing[3] }}" required>
            </div>

            <div class="form-group">
                <label for="product_name">Product Name</label>
                <input type="text" name="product_name" id="product_name" class="form-control" value="{{ listing[4] }}" required>
            </div>

            <div class="form-group">
                <label for="product_description">Product Description</label>
                <textarea name="product_description" id="product_description" rows="4" class="form-control" required>{{ listing[5] }}</textarea>
            </div>

            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="number" name="quantity" id="quantity" min="1" class="form-control" value="{{ listing[6] }}" required>
            </div>

            <div class="form-group">
                <label for="reserve_price">Reserve Price</label>
                <input type="number" name="reserve_price" id="reserve_price" min="0" step="0.01" class="form-control" value="{{ listing[7] }}" required>
            </div>

            <div class="form-group">
                <label for="max_bids">Max Bids</label>
                <input type="number" name="max_bids" id="max_bids" min="1" class="form-control" value="{{ listing[8] }}" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Update Listing</button>
        </form>
        {% else %}
            <div class="alert alert-danger">Listing not found.</div>
        {% endif %}
    </div>
</div>
{% endblock %}
