{% extends "page.html" %}

{% block content %}

<div class="container mt-4">
    <h2>Account Information</h2>

    {% if success %}
        <div class="alert alert-success mt-3">{{ success }}</div>
    {% endif %}

    {% if error %}
        <div class="alert alert-danger mt-3">{{ error }}</div>
    {% endif %}



    <form method="POST" action="/account_update?token={{ token }}">
        <div class="form-group">
            <label>Email (Help Desk required to change account email)</label>
            <input type="text" class="form-control" value="{{ email }}" readonly>
        </div>

        <div class="form-group">
            <label>Account Type</label>
            <input type="text" class="form-control" value="{{ type }}" readonly>
        </div>

        {% if type == 'Bidders' %}
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="first_name" class="form-control" value="{{ account_info[1] }}">
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="last_name" class="form-control" value="{{ account_info[2] }}">
            </div>

            <div class="form-group">
                <label>Age</label>
                <input type="number" name="age" class="form-control" value="{{ account_info[3] }}">
            </div>

            <div class="form-group">
                <label>Street Num</label>
                <input type="text" name="street_num" class="form-control" value="{{ address_info[2] }}">
            </div>

            <div class="form-group">
                <label>Street Name</label>
                <input type="text" name="street_name" class="form-control" value="{{ address_info[3] }}">
            </div>

            <div class="form-group">
                <label>City</label>
                <input type="text" name="city" class="form-control" value="{{ zipcode_info[1] }}">
            </div>

            <div class="form-group">
                <label>State</label>
                <input type="text" name="state" class="form-control" value="{{ zipcode_info[2] }}">
            </div>

            <div class="form-group">
                <label>Zipcode</label>
                <input type="text" name="zipcode" class="form-control" value="{{ zipcode_info[0] }}">
            </div>

            <div class="form-group">
                <label>Major</label>
                <input type="text" name="major" class="form-control" value="{{ account_info[5] }}">
            </div>
        {% endif %}

        {% if type == 'Sellers' %}
            <div class="form-group">
                <label>Bank Routing Number</label>
                <input type="text" name="bank_routing_number" class="form-control" value="{{ account_info[1] }}">
            </div>

            <div class="form-group">
                <label>Bank Account Number</label>
                <input type="text" name="bank_account_number" class="form-control" value="{{ account_info[2] }}">
            </div>
            <div class="form-group">
                <label>Balance</label>
                <input type="number" name="balance" class="form-control" value="{{ account_info[3] }}" readonly>
            </div>

        {% endif %}

        {% if is_vendor %}
            <div class="form-group">
                <label>Business Name</label>
                <input type="text" name="business_name" class="form-control" value="{{ vendor_info[1] }}">
            </div>

            <div class="form-group">
                <label>Street Num</label>
                <input type="text" name="street_num" class="form-control" value="{{ address_info[2] }}">
            </div>

            <div class="form-group">
                <label>Street Name</label>
                <input type="text" name="street_name" class="form-control" value="{{ address_info[3] }}">
            </div>

            <div class="form-group">
                <label>City</label>
                <input type="text" name="city" class="form-control" value="{{ zipcode_info[1] }}">
            </div>

            <div class="form-group">
                <label>State</label>
                <input type="text" name="state" class="form-control" value="{{ zipcode_info[2] }}">
            </div>

            <div class="form-group">
                <label>Zipcode</label>
                <input type="text" name="zipcode" class="form-control" value="{{ zipcode_info[0] }}">
            </div>

            <div class="form-group">
                <label>Customer Service Phone Number</label>
                <input type="text" name="customer_service_phone_number" class="form-control" value="{{ vendor_info[3] }}">
            </div>
        {% endif %}

        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="password" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary mt-3">Save Changes</button>
    </form>

    <hr>
</div>

{% endblock %}
