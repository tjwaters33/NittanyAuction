{% extends "base.html" %}

{% block content %}
        <form action="/login" method="POST">

			<div class="form-group">
				<label for="type">Account Type:</label>
				<select id="type" name="type" required class="form-control">

					<option value="Bidders">Bidder</option>
					<option value="Sellers">Seller</option>
					<option value="Helpdesk">Help Desk</option>
				</select>
			</div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="text" name="email" required class="form-control {% if error %}is-invalid{% endif %}">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" required class="form-control {% if error %}is-invalid{% endif %}" id="password" >
			</div>
            <button type="submit" class="btn btn-primary" style="width: 100%">Login</button>
            <!--<a class="btn btn-success" href="/" role="button">Go Back</a>-->
        </form>
		<!--<form action="/forget_password" method="POST">
            <a class="btn btn-success" href="/reset_password" role="button">Forgot Password?</a>
        </form>-->
{% endblock %}
